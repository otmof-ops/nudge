name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "nudge ${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            install.sh
            nudge.sh
            nudge.conf
            nudge.desktop
            nudge.timer
            nudge.service
            nudge-completion.bash
            nudge.1
            uninstall.sh
            lib/output.sh
            lib/config.sh
            lib/lock.sh
            lib/network.sh
            lib/pkgmgr.sh
            lib/notify.sh
            lib/schedule.sh
            lib/history.sh
            lib/safety.sh
            lib/selfupdate.sh
